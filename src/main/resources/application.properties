spring.application.name=LU Librisync
spring.config.import=optional:file:./scripts/local-dev.properties

spring.datasource.url=${LU_LIBRISYNC_DB_URL:jdbc:mysql://127.0.0.1:3306/lu_librisync?useSSL=false&serverTimezone=Asia/Manila&allowPublicKeyRetrieval=true}
spring.datasource.username=${LU_LIBRISYNC_DB_USERNAME:root}
spring.datasource.password=${LU_LIBRISYNC_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

server.error.whitelabel.enabled=false
server.servlet.session.timeout=30m

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

lulibrisync.storage.root=${LU_LIBRISYNC_STORAGE_ROOT:${user.dir}/storage}
lulibrisync.notification.outbox-root=${LU_LIBRISYNC_NOTIFICATION_OUTBOX_ROOT:${lulibrisync.storage.root}/email-outbox}
lulibrisync.smtp.host=${LU_LIBRISYNC_SMTP_HOST:smtp.gmail.com}
lulibrisync.smtp.port=${LU_LIBRISYNC_SMTP_PORT:587}
lulibrisync.smtp.username=${LU_LIBRISYNC_SMTP_USERNAME:lulibrisync@gmail.com}
lulibrisync.smtp.password=${LU_LIBRISYNC_SMTP_PASSWORD:zxjdkvscbmbzihez}
lulibrisync.smtp.from=${LU_LIBRISYNC_SMTP_FROM:lulibrisync@gmail.com}
lulibrisync.smtp.ssl=${LU_LIBRISYNC_SMTP_SSL:true}
lulibrisync.demo-data.enabled=${LU_LIBRISYNC_DEMO_DATA_ENABLED:true}
lulibrisync.circulation.daily-fine=${LU_LIBRISYNC_CIRCULATION_DAILY_FINE:2.00}
lulibrisync.circulation.reserve-daily-fine=${LU_LIBRISYNC_CIRCULATION_RESERVE_DAILY_FINE:50.00}
lulibrisync.circulation.max-active-loans=${LU_LIBRISYNC_CIRCULATION_MAX_ACTIVE_LOANS:5}
lulibrisync.circulation.max-loan-days=${LU_LIBRISYNC_CIRCULATION_MAX_LOAN_DAYS:14}
lulibrisync.circulation.block-on-overdue=${LU_LIBRISYNC_CIRCULATION_BLOCK_ON_OVERDUE:true}
lulibrisync.circulation.block-on-unpaid-fines=${LU_LIBRISYNC_CIRCULATION_BLOCK_ON_UNPAID_FINES:true}
lulibrisync.reservations.claim-hours=${LU_LIBRISYNC_RESERVATIONS_CLAIM_HOURS:48}
lulibrisync.profile-otp.resend-seconds=${LU_LIBRISYNC_PROFILE_OTP_RESEND_SECONDS:180}
lulibrisync.profile-otp.validity-minutes=${LU_LIBRISYNC_PROFILE_OTP_VALIDITY_MINUTES:10}
lulibrisync.registration-otp.resend-seconds=${LU_LIBRISYNC_REGISTRATION_OTP_RESEND_SECONDS:180}
lulibrisync.registration-otp.validity-minutes=${LU_LIBRISYNC_REGISTRATION_OTP_VALIDITY_MINUTES:10}
